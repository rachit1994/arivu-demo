name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: arivu-web/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.10.3
        run: corepack prepare yarn@4.10.3 --activate

      - name: Verify Yarn version
        working-directory: arivu-web
        run: yarn --version

      - name: Install dependencies
        working-directory: arivu-web
        run: yarn install --immutable

      - name: Build static export
        working-directory: arivu-web
        env:
          # GitHub Pages project site URL is:
          # https://USERNAME.github.io/REPO_NAME/
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
          # Optional: set these as GitHub Actions secrets if you want live Kalshi.
          # Keep them unset to use the app's mock fallback.
          NEXT_PUBLIC_KALSHI_ACCESS_KEY_ID: ${{ secrets.NEXT_PUBLIC_KALSHI_ACCESS_KEY_ID }}
          NEXT_PUBLIC_KALSHI_PRIVATE_KEY_PEM: ${{ secrets.NEXT_PUBLIC_KALSHI_PRIVATE_KEY_PEM }}
          NEXT_PUBLIC_KALSHI_BASE_URL: ${{ vars.NEXT_PUBLIC_KALSHI_BASE_URL }}
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: arivu-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
