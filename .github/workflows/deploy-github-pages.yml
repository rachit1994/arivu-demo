name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Do not use setup-node's cache: yarn — it runs global Yarn 1.x before Corepack,
      # which errors on package.json "packageManager": "yarn@4.x".
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.10.3
        run: corepack prepare yarn@4.10.3 --activate

      - name: Verify Yarn version
        working-directory: arivu-web
        run: yarn --version

      # Tilde (~) is not expanded by actions/cache; use the hosted runner home explicitly.
      - name: Cache Yarn Berry global cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-berry-${{ hashFiles('arivu-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-berry-

      - name: Install dependencies
        working-directory: arivu-web
        run: yarn install --immutable

      - name: Build static export
        working-directory: arivu-web
        env:
          # GitHub Pages project site URL is:
          # https://USERNAME.github.io/REPO_NAME/
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
          # Do NOT set NEXT_PUBLIC_KALSHI_* here. Next.js embeds NEXT_PUBLIC_* into the
          # client bundle at build time, so a private signing key would become public in
          # the deployed JS. GitHub Actions "secrets" do not change that. Use mock mode
          # on Pages; for live Kalshi use a server-side proxy or a non-static host.
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: arivu-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
