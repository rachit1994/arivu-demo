name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arivu-web
    steps:
      - uses: actions/checkout@v4

      # Do not use setup-node cache: yarn — global Yarn 1 runs before Corepack.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ubuntu-latest has Yarn 1.x in /usr/local/bin; it wins PATH over Corepack unless
      # Node's bin is prepended (see https://github.com/actions/setup-node/issues/1027).
      - name: Enable Corepack and Yarn 4.10.3
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          echo "$(dirname "$(which node)")" >> "$GITHUB_PATH"

      - name: Verify Yarn version
        run: yarn --version

      - name: Cache Yarn Berry global cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-berry-${{ hashFiles('arivu-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-berry-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      # Vitest + jsdom + Web Crypto is flaky on ubuntu-latest (importKey PKCS8 realm).
      # Run `yarn test` locally before pushing; CI validates lint + static export build.
      - name: Build (static export smoke)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
        run: yarn build
