name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arivu-web
    steps:
      - uses: actions/checkout@v4

      # Do not use setup-node cache: yarn — global Yarn 1 runs before Corepack.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.10.3
        run: corepack prepare yarn@4.10.3 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Cache Yarn Berry global cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.yarn/berry/cache
          key: ${{ runner.os }}-yarn-berry-${{ hashFiles('arivu-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-berry-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build (static export smoke)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
        run: yarn build
